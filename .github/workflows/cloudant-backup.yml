name: Cloudant Backup Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 5'   # Every Friday 6 PM UTC (11:30 PM IST)

jobs:
  cloudant-backup:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # Checkout Repository
      # ----------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------------------
      # Install Dependencies
      # ----------------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl python3-pip
          pip3 install awscli

      # ----------------------------------------
      # Create .env File From GitHub Secrets
      # ----------------------------------------
      - name: Create Environment File
        run: |
          echo "COUCH_URL=${{ secrets.COUCH_URL }}" > .env
          echo 'DATABASES="${{ secrets.DATABASES }}"' >> .env
          echo "ENV=${{ secrets.ENV }}" >> .env
          echo "UPLOAD_TO_S3=${{ secrets.UPLOAD_TO_S3 }}" >> .env
          echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> .env
          echo "S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> .env

      # ----------------------------------------
      # Verify .env Exists (Safe Debug)
      # ----------------------------------------
      - name: Verify Environment File
        run: |
          echo "Environment file created:"
          cat .env | sed 's/=.*/=***/'

      # ----------------------------------------
      # Give Script Execute Permission
      # ----------------------------------------
      - name: Give Execute Permission
        run: chmod +x manage_cloudant.sh

      # ----------------------------------------
      # Run Backup Script (Debug Enabled)
      # ----------------------------------------
      - name: Run Backup Script
        run: |
          set -x
          ./manage_cloudant.sh backup

      # ----------------------------------------
      # Debug Backup Directory
      # ----------------------------------------
      - name: Debug Backup Output
        run: |
          echo "Current directory:"
          pwd
          echo "Project structure:"
          ls -R
          echo "Checking backup folder:"
          ls -R backup || echo "Backup folder not found"

      # ----------------------------------------
      # Upload Backup Artifact
      # ----------------------------------------
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudant-backup
          path: backup/
          if-no-files-found: warn

      # -----------------------------
      # Slack Notification - SUCCESS
      # -----------------------------
      - name: Slack Success Notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"Cloudant Backup Stage SUCCESS\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nRun: ${{ github.run_number }}\nBranch: ${{ github.ref_name }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # -----------------------------
      # Slack Notification - FAILURE
      # -----------------------------
      - name: Slack Failure Notification
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"Cloudant Backup Stage FAILED\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nRun: ${{ github.run_number }}\nBranch: ${{ github.ref_name }}\nCheck Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
