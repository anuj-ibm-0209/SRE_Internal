name: Cloudant Backup Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: stage
        type: choice
        options:
          - stage
          - prod

  schedule:
    - cron: '0 18 * * 5'   # Every Friday

jobs:
  cloudant-backup:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'stage' }}

    steps:
      # Checkout Repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl python3-pip
          pip3 install awscli

      # Create ENV File
      - name: Create Environment File
        run: |
          echo "COUCH_URL=${{ secrets.COUCH_URL }}" > .env
          echo 'DATABASES="${{ secrets.DATABASES }}"' >> .env
          echo "ENV=${{ secrets.ENV }}" >> .env
          echo "UPLOAD_TO_S3=${{ secrets.UPLOAD_TO_S3 }}" >> .env
          echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> .env
          echo "S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> .env

      # Run Backup
      - name: Run Backup Script
        run: ./manage_cloudant.sh backup

      # Upload Artifact
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudant-backup-${{ secrets.ENV }}
          path: backup/
          if-no-files-found: warn
